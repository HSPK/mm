site_name: MM
site_description: Local-first media library management for photos, videos, and audio.
site_url: https://hspk.github.io/mm/
repo_name: HSPK/mm
repo_url: https://github.com/HSPK/mm

theme:
  name: mkdocs
  nav_style: dark
  highlightjs: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
      - Getting Started: tutorials/getting-started.md
      - Import and Organize: tutorials/import-and-organize.md
      - Web UI Guide: tutorials/web-ui.md
  - Architecture:
      - Design Overview: architecture/overview.md
  - Development:
      - Developer Setup: development/setup.md
