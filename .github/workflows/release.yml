name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/litemm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm ci --prefix web
          npm --prefix web run build

      - name: Verify frontend bundle
        run: |
          test -f web/dist/index.html
          test -d web/dist/assets
          test -n "$(find web/dist/assets -type f -name '*.js' -print -quit)"
          test -n "$(find web/dist/assets -type f -name '*.css' -print -quit)"

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify packaged web bundle
        run: |
          python -m zipfile --list dist/*.whl | grep -q 'mm/_web_dist/index.html'
          tar -tf dist/*.tar.gz | grep -q 'web/dist/index.html'

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
