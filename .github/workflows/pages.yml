name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Build docs
        run: uv run --locked --only-group docs mkdocs build --strict
        env:
          UV_HTTP_TIMEOUT: "120"

      - name: Validate docs bundle
        run: |
          test -f site/index.html
          test -f site/sitemap.xml
          grep -q "Organize your media without giving up control." site/index.html
          grep -q "https://github.com/HSPK/mm" site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@v4
