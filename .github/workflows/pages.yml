name: Homepage

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
      - "README.md"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate homepage bundle
        run: |
          test -f site/index.html
          test -f site/styles.css
          grep -q "MM - Universal Organizer for Media" site/index.html
          grep -q "https://github.com/HSPK/mm" site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload homepage artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy homepage
        id: deployment
        uses: actions/deploy-pages@v4
